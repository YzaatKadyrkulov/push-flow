name: Auto Commit

on:
  schedule:
    - cron: "*/15 * * * *"

jobs:
  auto-commit:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "YzaatKadyrkulov"
          git config user.email "yzaatkadyrkulov7@gmail.com"

      - name: Make changes
        run: |
          echo "$(date) - Auto commit executed" >> auto_update.txt
          git add auto_update.txt
          git commit -m "Auto Commit - $(date)" || echo "No changes to commit"

      - name: Push changes
        env:
          TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:${TOKEN}@github.com/YzaatKadyrkulov/push-flow.git
          git pull --rebase origin main
          git push origin main